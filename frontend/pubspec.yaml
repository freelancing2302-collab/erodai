name: watery_mobile
description: "Water Bodies Monitoring System - Flutter Mobile App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  
  # API & Networking
  dio: ^5.3.0
  retrofit: ^4.1.0
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Maps & Geolocation
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  
  # Authentication
  supabase_flutter: ^1.10.0
  
  # UI Components
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  lottie: ^2.6.0
  
  # Navigation
  go_router: ^12.1.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Logging & Analytics
  logger: ^2.1.0
  firebase_analytics: ^10.5.0
  # firebase_crashlytics: ^3.4.0  # Disabled for web compatibility
  
  # Notifications
  flutter_local_notifications: ^15.1.0
  # firebase_messaging: ^14.7.0  # Disabled for web compatibility
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  
  # Utils
  get_it: ^7.6.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0
  retrofit_generator: ^8.2.1
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
