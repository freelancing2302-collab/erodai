<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erodai - Water Monitoring System</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDtMx-9pxVFf5xp4pAp9xVFf5xp4pAp9x&libraries=drawing,geometry"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 0;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .water-bodies-list {
            margin-top: 20px;
        }
        
        .water-body-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .water-body-card h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }
        
        .water-body-card p {
            color: #666;
            font-size: 13px;
            margin-bottom: 3px;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #mapContainer {
            width: 100%;
            height: 350px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        
        .map-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .map-controls button {
            padding: 10px;
            font-size: 13px;
        }
        
        .location-info {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .location-info.visible {
            display: block;
        }
        
        .location-info p {
            color: #666;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .location-info strong {
            color: #333;
        }
        
        .urbanization-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .urbanization-badge.high {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .urbanization-badge.medium {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .urbanization-badge.low {
            background-color: #d4edda;
            color: #155724;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .map-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💧 Erodai</h1>
            <p>Water Body Monitoring System</p>
        </div>
        
        <div id="authTabs" class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
            <button class="tab-btn" id="dashboardTabBtn" style="display:none;" onclick="switchTab('dashboard')">Dashboard</button>
            <button id="logoutBtn" style="display:none; flex: 0.5; background: #dc3545;" onclick="logout()">Logout</button>
        </div>
        
        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <div id="loginMessage" class="message"></div>
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your email or username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button onclick="handleLogin()">Login</button>
        </div>
        
        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <div id="registerMessage" class="message"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="registerName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="registerUsername" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="registerConfirm" placeholder="Confirm your password">
            </div>
            <button onclick="handleRegister()">Register</button>
        </div>
        
        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content">
            <div class="dashboard-grid">
                <div>
                    <h3 style="margin: 0 0 15px 0; color: #333;">Add Water Body with Map</h3>
                    <div id="mapContainer"></div>
                    
                    <div class="map-controls">
                        <button onclick="searchLocation()">📍 Search Location</button>
                        <button onclick="getCurrentLocation()">🎯 My Location</button>
                        <button onclick="clearMapSelection()">🔄 Clear</button>
                    </div>
                    
                    <div id="locationInfo" class="location-info">
                        <p><strong>Latitude:</strong> <span id="selectedLat">-</span></p>
                        <p><strong>Longitude:</strong> <span id="selectedLng">-</span></p>
                        <p><strong>Address:</strong> <span id="selectedAddress">-</span></p>
                        <p id="urbanizationStatus"></p>
                    </div>
                    
                    <div id="dashboardMessage" class="message"></div>
                    
                    <div class="form-group">
                        <label>Water Body Name *</label>
                        <input type="text" id="waterBodyName" placeholder="e.g., Lake Superior">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="waterBodyDesc" placeholder="Optional description" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Area (sq km) *</label>
                        <input type="number" id="waterBodyArea" placeholder="0" step="0.1">
                    </div>
                    <button onclick="handleAddWaterBody()">✅ Add Water Body</button>
                </div>
                
                <div>
                    <h3 style="margin: 0 0 15px 0; color: #333;">Water Bodies</h3>
                    <div id="waterBodiesList" class="water-bodies-list">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/v1';
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            
            // Find and activate the clicked button
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                if (btn.textContent.toLowerCase().includes(tabName) || 
                    (tabName === 'dashboard' && btn.textContent === 'Dashboard') ||
                    (tabName === 'login' && btn.textContent === 'Login') ||
                    (tabName === 'register' && btn.textContent === 'Register')) {
                    btn.classList.add('active');
                }
            });
            
            if (tabName === 'dashboard') {
                setTimeout(initMap, 500);
                loadWaterBodies();
            }
        }
        
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            
            if (!username || !password) {
                showMessage(msgDiv, 'Please fill all fields', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage(msgDiv, 'Login successful!', 'success');
                    setTimeout(() => {
                        document.getElementById('authTabs').style.display = 'none';
                        document.getElementById('dashboardTabBtn').style.display = 'block';
                        document.getElementById('logoutBtn').style.display = 'block';
                        switchTab('dashboard');
                    }, 500);
                } else {
                    showMessage(msgDiv, data.detail || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage(msgDiv, 'Error: ' + error.message, 'error');
            }
        }
        
        async function handleRegister() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const msgDiv = document.getElementById('registerMessage');
            
            if (!name || !email || !username || !password || !confirm) {
                showMessage(msgDiv, 'Please fill all fields', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage(msgDiv, 'Passwords do not match', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: name, email, username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(msgDiv, 'Registration successful! Please login.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showMessage(msgDiv, data.detail || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage(msgDiv, 'Error: ' + error.message, 'error');
            }
        }
        
        async function handleAddWaterBody() {
            const name = document.getElementById('waterBodyName').value;
            const description = document.getElementById('waterBodyDesc').value;
            const area = parseFloat(document.getElementById('waterBodyArea').value);
            const msgDiv = document.getElementById('dashboardMessage');
            
            if (!name || !area) {
                showMessage(msgDiv, 'Please fill required fields', 'error');
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/water-bodies`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        name,
                        description,
                        area_sq_km: area,
                        location: { type: 'Point', coordinates: [0, 0] }
                    })
                });
                
                if (response.ok) {
                    showMessage(msgDiv, 'Water body added successfully!', 'success');
                    document.getElementById('waterBodyName').value = '';
                    document.getElementById('waterBodyDesc').value = '';
                    document.getElementById('waterBodyArea').value = '';
                    loadWaterBodies();
                } else {
                    const data = await response.json();
                    showMessage(msgDiv, data.detail || 'Failed to add water body', 'error');
                }
            } catch (error) {
                showMessage(msgDiv, 'Error: ' + error.message, 'error');
            }
        }
        
        async function loadWaterBodies() {
            const listDiv = document.getElementById('waterBodiesList');
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/water-bodies`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const bodies = data.data || [];
                    
                    if (bodies.length === 0) {
                        listDiv.innerHTML = '<p style="color: #666; text-align: center;">No water bodies yet. Add one above!</p>';
                    } else {
                        listDiv.innerHTML = bodies.map(body => `
                            <div class="water-body-card">
                                <h3>${body.name}</h3>
                                <p><strong>Area:</strong> ${body.area_sq_km} sq km</p>
                                <p><strong>Description:</strong> ${body.description || 'N/A'}</p>
                                <p style="font-size: 12px; color: #999;">Added: ${new Date(body.created_at).toLocaleDateString()}</p>
                            </div>
                        `).join('');
                    }
                } else {
                    listDiv.innerHTML = '<p style="color: #dc3545;">Failed to load water bodies</p>';
                }
            } catch (error) {
                listDiv.innerHTML = `<p style="color: #dc3545;">Error: ${error.message}</p>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        }
        
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.className = 'message';
            }, 5000);
        }
        
        // Map functions
        let map = null;
        let selectedMarker = null;
        
        function initMap() {
            const mapContainer = document.getElementById('mapContainer');
            if (!mapContainer || map) return;
            
            map = new google.maps.Map(mapContainer, {
                zoom: 6,
                center: { lat: 20, lng: 78 },
                mapTypeId: 'terrain'
            });
            
            map.addListener('click', (event) => {
                selectLocation(event.latLng);
            });
        }
        
        function selectLocation(latLng) {
            if (selectedMarker) {
                selectedMarker.setMap(null);
            }
            
            selectedMarker = new google.maps.Marker({
                position: latLng,
                map: map,
                animation: google.maps.Animation.DROP
            });
            
            document.getElementById('selectedLat').textContent = latLng.lat().toFixed(6);
            document.getElementById('selectedLng').textContent = latLng.lng().toFixed(6);
            document.getElementById('locationInfo').classList.add('visible');
            
            // Get address from geocoder
            getAddressFromCoordinates(latLng);
        }
        
        function getAddressFromCoordinates(latLng) {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: latLng }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    document.getElementById('selectedAddress').textContent = results[0].formatted_address;
                }
            });
        }
        
        function searchLocation() {
            const location = prompt('Enter location name:');
            if (!location) return;
            
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: location }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    map.setCenter(results[0].geometry.location);
                    selectLocation(results[0].geometry.location);
                } else {
                    alert('Location not found');
                }
            });
        }
        
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const latLng = new google.maps.LatLng(
                        position.coords.latitude,
                        position.coords.longitude
                    );
                    map.setCenter(latLng);
                    selectLocation(latLng);
                }, (error) => {
                    alert('Unable to get current location: ' + error.message);
                });
            } else {
                alert('Geolocation is not supported by your browser');
            }
        }
        
        function clearMapSelection() {
            if (selectedMarker) {
                selectedMarker.setMap(null);
                selectedMarker = null;
            }
            document.getElementById('locationInfo').classList.remove('visible');
            document.getElementById('selectedLat').textContent = '-';
            document.getElementById('selectedLng').textContent = '-';
            document.getElementById('selectedAddress').textContent = '-';
        }
        
        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('authTabs').style.display = 'none';
                document.getElementById('dashboardTabBtn').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('register').classList.remove('active');
                document.getElementById('dashboard').classList.add('active');
                setTimeout(initMap, 500);
                loadWaterBodies();
            } else {
                // Show login tab by default
                document.getElementById('login').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            }
        });
    </script>
</body>
</html>
